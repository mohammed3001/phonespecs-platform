<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320" width="256" height="320">
  <defs>
    <linearGradient id="bg-apple-iphone-15-pro-max" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screen-apple-iphone-15-pro-max" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Phone Body -->
  <rect x="28" y="12" width="200" height="296" rx="28" ry="28" fill="url(#bg-apple-iphone-15-pro-max)" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Screen -->
  <rect x="36" y="24" width="184" height="272" rx="20" ry="20" fill="url(#screen-apple-iphone-15-pro-max)"/>
  <!-- Status Bar -->
  <rect x="100" y="30" width="56" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <!-- Camera Notch/Dot -->
  <circle cx="128" cy="38" r="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Brand Name -->
  <text x="128" y="140" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" opacity="0.9">iPhone 15 Pro Max</text>
  <!-- Decorative Lines -->
  <line x1="68" y1="160" x2="188" y2="160" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="88" y1="175" x2="168" y2="175" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="98" y1="190" x2="158" y2="190" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Home Indicator -->
  <rect x="98" y="278" width="60" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
</svg>
