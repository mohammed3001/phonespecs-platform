version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mp-postgres
    environment:
      POSTGRES_DB: mobileplatform
      POSTGRES_USER: mp_dev
      POSTGRES_PASSWORD: mp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp_dev -d mobileplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
